name: P.L.U.M.B.U.S. Daily Transmission

on:
  schedule:
    - cron: '0 12 * * *' # 08:00 AM EDT daily
  workflow_dispatch: # Allow manual trigger

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install System Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc curl

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r engine/requirements.txt

      - name: Run Market Briefing
        env:
          NVIDIA_KEY: ${{ secrets.NVIDIA_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          mkdir -p assets/generated
          chmod +x scripts/plumbus.sh run.sh
          ./run.sh

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trade_state.json data/trade_history.json data/last_brief.txt assets/generated/latest.png
          git commit -m "Automated state and asset update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || echo "No changes to commit"
          git push
