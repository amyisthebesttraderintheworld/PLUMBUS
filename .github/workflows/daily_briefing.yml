name: P.L.U.M.B.U.S. Daily Transmission

on:
  schedule:
    - cron: '0 9 * * *' # 9 AM UTC Daily
  workflow_dispatch: # Allow manual trigger

jobs:
  briefing:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: sudo apt-get update && sudo apt-get install -y jq bc curl

      - name: Run Market Briefing
        env:
          NVIDIA_KEY: ${{ secrets.NVIDIA_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          chmod +x market_breif.sh
          ./market_breif.sh

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add trade_state.json trade_history.json last_brief.txt
          git commit -m "Automated state update: $(date -u +'%Y-%m-%d %H:%M:%S') UTC" || echo "No changes to commit"
          git push
